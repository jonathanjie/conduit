# Shared location blocks for both HTTP and HTTPS server blocks

client_max_body_size 50M;

# Telegram webhook endpoint — validates secret token header
location /webhook {
    # Validate Telegram webhook secret
    if ($http_x_telegram_bot_api_secret_token = "") {
        return 403;
    }

    proxy_pass http://conduit_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# REST API endpoints
location /api/ {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass http://conduit_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Enable gzip for JSON responses
    gzip on;
    gzip_types application/json;
    gzip_min_length 256;
}

# Health check — passthrough, no auth
location /healthz {
    proxy_pass http://conduit_app;
    proxy_http_version 1.1;
}

# Frontend SPA — static files with fallback to index.html
location / {
    root /var/www/conduit;
    try_files $uri $uri/ /index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
