# Conduit — Nginx Configuration
# Routes: /webhook → bot, /api/* → REST API, /* → SPA static files

upstream conduit_app {
    server app:3000;
}

# Rate limiting zone for API (protects login endpoint)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # In production, redirect HTTP → HTTPS
    # Uncomment when TLS is configured:
    # return 301 https://$host$request_uri;

    # For dev, proxy directly
    include /etc/nginx/conf.d/locations.conf;
}

