version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conduit-app
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - conduit_net

  postgres:
    image: postgres:16-alpine
    container_name: conduit-postgres
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit
      POSTGRES_DB: conduit
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U conduit']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - conduit_net

  redis:
    image: redis:7-alpine
    container_name: conduit-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - conduit_net

  nginx:
    image: nginx:alpine
    container_name: conduit-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/var/www/conduit:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - conduit_net

volumes:
  pgdata:
  redisdata:

networks:
  conduit_net:
    driver: bridge
